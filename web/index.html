<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Blackjack</title>
    <style>
        body { margin:0; font-family:Arial; background:#083c24; color:white; text-align:center; }
        h1 { margin-top:20px; }
        #layout { display:flex; justify-content:center; align-items:flex-start; gap:40px; margin-top:30px; }
        #leaderboardBox { width:260px; }
        #leaderboardBox table { width:100%; border-collapse:collapse; }
        #leaderboardBox th, #leaderboardBox td { padding:8px; border-bottom:1px solid rgba(255,255,255,0.2); }
        #historyBox { width:900px; margin:auto; margin-top:40px; }
        #historyBox table { width:100%; border-collapse:collapse; }
        #historyBox th, #historyBox td { padding:8px; border-bottom:1px solid rgba(255,255,255,0.2); }
        #table {
            background:radial-gradient(circle,#0a5c2f,#06381c);
            border:6px solid #caa44b;
            border-radius:50px;
            width:700px;
            max-width:95%;
            padding:30px;
            box-shadow:0 0 40px rgba(0,0,0,0.6);
        }
        .cards { display:flex; justify-content:center; gap:10px; margin:20px; flex-wrap:wrap; min-height:140px; }
        .card { width:90px; height:130px; opacity:0; transform:translateY(-80px) rotate(-10deg); transition:0.5s ease; }
        .card.show { opacity:1; transform:translateY(0) rotate(0deg); }
        .chips { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin:20px; }
        .chip {
            width:60px; height:60px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-weight:bold; cursor:pointer; border:3px solid white; transition:0.4s;
        }
        .chip.red{background:#e74c3c}
        .chip.blue{background:#3498db}
        .chip.green{background:#2ecc71}
        .chip.black{background:#333}
        /* Премиум фишки */
        .chip.premium {
            border:3px solid #ffd700;
            box-shadow:0 0 15px rgba(255,215,0,0.6), inset 0 0 20px rgba(255,255,255,0.3);
            background:linear-gradient(135deg, #ffd700 0%, #ffec8b 25%, #ffd700 50%, #daa520 75%, #ffd700 100%);
            color:#333;
            font-weight:bold;
            animation:chipShine 3s ease-in-out infinite;
        }
        .chip.premium.red{background:linear-gradient(135deg,#e74c3c,#ff6b6b,#e74c3c)}
        .chip.premium.blue{background:linear-gradient(135deg,#3498db,#74b9ff,#3498db)}
        .chip.premium.green{background:linear-gradient(135deg,#2ecc71,#55efc4,#2ecc71)}
        .chip.premium.black{background:linear-gradient(135deg,#2d3436,#636e72,#2d3436);color:#ffd700}
        @keyframes chipShine {
            0%,100%{box-shadow:0 0 15px rgba(255,215,0,0.6), inset 0 0 20px rgba(255,255,255,0.3)}
            50%{box-shadow:0 0 25px rgba(255,215,0,0.9), inset 0 0 25px rgba(255,255,255,0.5)}
        }
        .buy-chips-btn {
            background:linear-gradient(180deg,#ffd700,#daa520);
            color:#333;
            border:2px solid #ffec8b;
            margin:10px 0;
        }
        .buy-chips-btn:hover { filter:brightness(1.1) }
        .buy-chips-btn:disabled { opacity:0.5; cursor:not-allowed }
        button { padding:12px 20px; font-size:16px; border:none; border-radius:10px; cursor:pointer; margin:5px; }
        #hitBtn{background:#2ecc71}
        #standBtn{background:#e74c3c}
        #betBtn{background:#3498db}
        #clearBtn{background:#f39c12}
        #againBtn{background:#9b59b6}

        /* Auth screens */
        #authScreen { display:flex; flex-direction:column; align-items:center; margin-top:60px; }
        .auth-box {
            background:rgba(0,0,0,0.3);
            padding:30px;
            border-radius:15px;
            border:2px solid #caa44b;
            width:320px;
            margin:20px;
        }
        .auth-box h2 { margin-top:0; }
        .auth-box input {
            width:100%;
            padding:12px;
            margin:8px 0;
            box-sizing:border-box;
            border-radius:8px;
            border:2px solid #0a5c2f;
            font-size:16px;
        }
        .auth-box button { width:100%; margin-top:10px; background:#2ecc71; }
        .auth-box .error { color:#e74c3c; margin:10px 0; }
        .auth-tabs { display:flex; gap:10px; margin-bottom:20px; }
        .auth-tabs button { background:transparent; border:2px solid #caa44b; }
        .auth-tabs button.active { background:#caa44b; color:#083c24; }
        #gameScreen { display:none; }
        .user-bar { margin:10px 0; font-size:14px; }
        .user-bar span { margin:0 15px; }
        .logout-btn { background:#e74c3c !important; padding:6px 12px; font-size:14px; }
    </style>
</head>
<body>

<h1>🃏 Blackjack</h1>

<!-- Auth screen -->
<div id="authScreen">
    <div class="auth-tabs">
        <button id="tabLogin" class="active">Вход</button>
        <button id="tabRegister">Регистрация</button>
    </div>

    <div id="loginBox" class="auth-box">
        <h2>Вход</h2>
        <div id="loginError" class="error"></div>
        <input type="text" id="loginUsername" placeholder="Ник" autocomplete="username">
        <input type="password" id="loginPassword" placeholder="Пароль" autocomplete="current-password">
        <button id="loginBtn">Войти</button>
    </div>

    <div id="registerBox" class="auth-box" style="display:none">
        <h2>Регистрация</h2>
        <div id="registerError" class="error"></div>
        <input type="text" id="registerUsername" placeholder="Ник" autocomplete="username">
        <input type="password" id="registerPassword" placeholder="Пароль (мин. 6 символов)" autocomplete="new-password">
        <button id="registerBtn">Зарегистрироваться</button>
    </div>
</div>

<!-- Game screen -->
<div id="gameScreen">
    <div class="user-bar">
        <span id="userName"></span>
        <span>Баланс: $<span id="topBalance">0</span></span>
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>

    <div id="layout">
        <div id="leaderboardBox">
            <h2>🏆 Leaderboard</h2>
            <table>
                <tr><th>Игрок</th><th>Баланс</th><th>Выиграно</th></tr>
                <tbody id="leaderboard"></tbody>
            </table>
        </div>

        <div id="table">
            <div id="balance">Баланс: $1000</div>
            <h3>Текущая ставка: $<span id="betAmount">0</span></h3>
            <div id="chipsContainer" class="chips">
                <div class="chip red" data-value="10" onclick="addChip(this,10)">10</div>
                <div class="chip blue" data-value="50" onclick="addChip(this,50)">50</div>
                <div class="chip green" data-value="100" onclick="addChip(this,100)">100</div>
                <div class="chip black" data-value="500" onclick="addChip(this,500)">500</div>
            </div>
            <div id="buyChipsBox" style="display:none">
                <button class="buy-chips-btn" id="buyChipsBtn">✨ Купить красивые фишки ($1200)</button>
            </div>
            <button id="clearBtn">Сбросить ставку</button>
            <button id="betBtn">Сделать ставку</button>
            <h2>Дилер</h2>
            <div id="dealerCards" class="cards"></div>
            <div>Очки: <span id="dealerTotal">?</span></div>
            <h2>Игрок</h2>
            <div id="playerCards" class="cards"></div>
            <div>Очки: <span id="playerTotal">0</span></div>
            <br>
            <button id="hitBtn">Взять карту</button>
            <button id="standBtn">Остановиться</button>
            <h2 id="result"></h2>
            <button id="againBtn" style="display:none;">Играть снова</button>
        </div>
    </div>

    <div id="historyBox">
        <h2>📜 История игр</h2>
        <table>
            <tr><th>Ваши карты</th><th>Карты дилера</th><th>Ставка</th><th>Результат</th></tr>
            <tbody id="history"></tbody>
        </table>
    </div>
</div>

<script>
    const leaderboardTable = document.getElementById("leaderboard")
    const historyTable = document.getElementById("history")
    const dealerCards = document.getElementById("dealerCards")
    const playerCards = document.getElementById("playerCards")
    const balanceText = document.getElementById("balance")
    const betText = document.getElementById("betAmount")
    const dealerTotal = document.getElementById("dealerTotal")
    const playerTotal = document.getElementById("playerTotal")
    const result = document.getElementById("result")
    const hitBtn = document.getElementById("hitBtn")
    const standBtn = document.getElementById("standBtn")
    const betBtn = document.getElementById("betBtn")
    const clearBtn = document.getElementById("clearBtn")
    const againBtn = document.getElementById("againBtn")

    let bet = 0
    let gameRunning = false
    let premiumChips = false

    async function api(url, method = "GET", data = null) {
        const options = { method, credentials: "include", headers: {} }
        if (data) {
            options.headers["Content-Type"] = "application/json"
            options.body = JSON.stringify(data)
        }
        const res = await fetch(url, options)
        let body
        try { body = await res.json() } catch { body = {} }
        if (!res.ok && body.error) {
            return { error: body.error, status: res.status }
        }
        if (!res.ok) return { error: "Ошибка " + res.status, status: res.status }
        return body
    }

    function showScreen(isAuth) {
        document.getElementById("authScreen").style.display = isAuth ? "flex" : "none"
        document.getElementById("gameScreen").style.display = isAuth ? "none" : "block"
    }

    async function checkAuth() {
        const data = await api("/api/me")
        if (data.error) {
            showScreen(true)
            return false
        }
        if (data.user_id) {
            document.getElementById("userName").textContent = data.name || "Player"
            document.getElementById("topBalance").textContent = data.balance ?? 0
            premiumChips = !!data.premium_chips
            showScreen(false)
            await initGame()
            return true
        }
        showScreen(true)
        return false
    }

    async function initGame() {
        await load()
        loadLeaderboard()
        loadHistory()
        updateChipsStyle()
        updateBuyChipsButton()
    }

    async function loadLeaderboard() {
        const data = await fetch("/api/leaderboard").then(r => r.json())
        leaderboardTable.innerHTML = ""
        data.forEach(p => {
            leaderboardTable.innerHTML += `<tr>
                <td>${p.name ?? "Player"}</td>
                <td>$${p.balance ?? 0}</td>
                <td>$${p.total_won ?? 0}</td>
            </tr>`
        })
    }

    async function loadHistory() {
        const data = await api("/api/history")
        historyTable.innerHTML = ""
        if (Array.isArray(data)) {
            data.forEach(g => {
                historyTable.innerHTML += `<tr>
                    <td>${g.player_cards}</td>
                    <td>${g.dealer_cards}</td>
                    <td>$${g.bet}</td>
                    <td>${g.result}</td>
                </tr>`
            })
        }
    }

    function renderCards(container, cards) {
        container.innerHTML = ""
        cards.forEach((card, i) => {
            let img = document.createElement("img")
            img.src = cardImage(card)
            img.className = "card"
            container.appendChild(img)
            setTimeout(() => img.classList.add("show"), i * 200)
        })
    }

    function cardImage(card) {
        if (card === "🂠") return "https://deckofcardsapi.com/static/img/back.png"
        let rank = card.slice(0, -1), suit = card.slice(-1)
        const suitMap = {"♠":"S","♥":"H","♦":"D","♣":"C"}
        const rankMap = {"A":"A","K":"K","Q":"Q","J":"J","10":"0","9":"9","8":"8","7":"7","6":"6","5":"5","4":"4","3":"3","2":"2"}
        return `https://deckofcardsapi.com/static/img/${rankMap[rank]}${suitMap[suit]}.png`
    }

    function updateChipsStyle() {
        document.querySelectorAll("#chipsContainer .chip").forEach(el => {
            el.classList.toggle("premium", premiumChips)
        })
    }
    function updateBuyChipsButton() {
        const box = document.getElementById("buyChipsBox")
        const btn = document.getElementById("buyChipsBtn")
        const balance = parseInt(document.getElementById("topBalance").textContent) || 0
        if (!premiumChips && balance >= 1200) {
            box.style.display = "block"
            btn.disabled = false
        } else {
            box.style.display = "none"
        }
    }
    function update(data) {
        if (!data || typeof data.balance !== "number") return
        balanceText.innerText = "Баланс: $" + data.balance
        document.getElementById("topBalance").textContent = data.balance
        if (data.premium_chips !== undefined) premiumChips = !!data.premium_chips
        updateChipsStyle()
        updateBuyChipsButton()
        renderCards(playerCards, data.player || [])
        renderCards(dealerCards, data.dealer || [])
        playerTotal.innerText = data.playerValue
        dealerTotal.innerText = data.dealer && data.dealer.includes("🂠") ? "?" : data.dealerValue
        result.innerText = data.result || ""

        if (data.gameOver) {
            loadLeaderboard()
            loadHistory()
            gameRunning = false
            hitBtn.disabled = true
            standBtn.disabled = true
            againBtn.style.display = "inline-block"
        } else {
            hitBtn.disabled = false
            standBtn.disabled = false
        }
    }

    function addChip(el, value) {
        if (gameRunning) return
        bet += value
        betText.innerText = bet
    }

    clearBtn.onclick = () => { if (!gameRunning) { bet = 0; betText.innerText = 0 } }
    function handleApiError(data) {
        if (data.status === 401) { showScreen(true); return true }
        result.innerText = data.error || "Ошибка"
        return true
    }
    betBtn.onclick = async () => {
        if (gameRunning || bet === 0) return
        gameRunning = true
        againBtn.style.display = "none"
        let data = await api("/api/bet", "POST", { bet })
        if (data.error) { gameRunning = false; handleApiError(data); return }
        update(data)
    }
    hitBtn.onclick = async () => {
        if (!gameRunning) return
        hitBtn.disabled = true
        standBtn.disabled = true
        let data = await api("/api/hit", "POST")
        if (data.error) { hitBtn.disabled = false; standBtn.disabled = false; handleApiError(data); return }
        update(data)
    }
    standBtn.onclick = async () => {
        if (!gameRunning) return
        hitBtn.disabled = true
        standBtn.disabled = true
        let data = await api("/api/stand", "POST")
        if (data.error) { hitBtn.disabled = false; standBtn.disabled = false; handleApiError(data); return }
        update(data)
    }
    againBtn.onclick = () => {
        bet = 0
        betText.innerText = 0
        dealerCards.innerHTML = ""
        playerCards.innerHTML = ""
        dealerTotal.innerText = "?"
        playerTotal.innerText = "0"
        result.innerText = ""
        gameRunning = false
        againBtn.style.display = "none"
    }

    async function load() {
        let data = await api("/api/state")
        if (data.error) {
            if (data.status === 401) { showScreen(true); return }
            result.innerText = data.error || "Ошибка загрузки"
            return
        }
        update(data)
    }

    // Auth handlers
    document.getElementById("tabLogin").onclick = () => {
        document.getElementById("tabLogin").classList.add("active")
        document.getElementById("tabRegister").classList.remove("active")
        document.getElementById("loginBox").style.display = "block"
        document.getElementById("registerBox").style.display = "none"
        document.getElementById("loginError").textContent = ""
        document.getElementById("registerError").textContent = ""
    }
    document.getElementById("tabRegister").onclick = () => {
        document.getElementById("tabRegister").classList.add("active")
        document.getElementById("tabLogin").classList.remove("active")
        document.getElementById("registerBox").style.display = "block"
        document.getElementById("loginBox").style.display = "none"
        document.getElementById("loginError").textContent = ""
        document.getElementById("registerError").textContent = ""
    }

    document.getElementById("loginBtn").onclick = async () => {
        const username = document.getElementById("loginUsername").value.trim()
        const password = document.getElementById("loginPassword").value
        document.getElementById("loginError").textContent = ""
        if (!username || !password) {
            document.getElementById("loginError").textContent = "Введите ник и пароль"
            return
        }
        const data = await api("/api/login", "POST", { username, password })
        if (data.error) {
            document.getElementById("loginError").textContent = data.error
            return
        }
        document.getElementById("userName").textContent = data.name || username
        document.getElementById("topBalance").textContent = data.balance ?? 0
        premiumChips = !!data.premium_chips
        showScreen(false)
        await initGame()
    }

    document.getElementById("registerBtn").onclick = async () => {
        const username = document.getElementById("registerUsername").value.trim()
        const password = document.getElementById("registerPassword").value
        document.getElementById("registerError").textContent = ""
        if (!username || !password) {
            document.getElementById("registerError").textContent = "Введите ник и пароль"
            return
        }
        if (password.length < 6) {
            document.getElementById("registerError").textContent = "Пароль минимум 6 символов"
            return
        }
        const data = await api("/api/register", "POST", { username, password })
        if (data.error) {
            document.getElementById("registerError").textContent = data.error
            return
        }
        document.getElementById("userName").textContent = username
        document.getElementById("topBalance").textContent = "1000"
        showScreen(false)
        await initGame()
    }

    document.getElementById("buyChipsBtn").onclick = async () => {
        const data = await api("/api/buy-chips", "POST", {})
        if (data.error) {
            result.innerText = data.error
            return
        }
        premiumChips = true
        document.getElementById("topBalance").textContent = data.balance
        balanceText.innerText = "Баланс: $" + data.balance
        document.getElementById("buyChipsBox").style.display = "none"
        updateChipsStyle()
        result.innerText = "✨ Красивые фишки куплены!"
        setTimeout(() => result.innerText = "", 3000)
    }

    document.getElementById("logoutBtn").onclick = async () => {
        await api("/api/logout", "POST")
        showScreen(true)
        document.getElementById("loginUsername").value = ""
        document.getElementById("loginPassword").value = ""
        document.getElementById("loginError").textContent = ""
    }

    window.onload = () => checkAuth()
</script>
</body>
</html>
